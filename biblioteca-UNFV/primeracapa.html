<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login y registro</title>
    <link rel="stylesheet" href="base.css?v=2">
</head>
<body>

    <main>
           <div class="contenedor__todo">

               <div class="caja__trasera">
                  <div class="caja__trasera-login">
                   <h3>¿Ya tienes una cuenta?</h3>
                    <p>Inicia sesión para entrar en la página</p>
                 <button id="btn__iniciar-sesion">Iniciar Sesión</button>
             </div>

            <div class="caja__trasera-register">
             <h3>¿Aún no tienes una cuenta?</h3>
                <p>Regístrate para entrar en la página</p>
               <button id="btn__registrarse">Registrarse</button>
               </div>
           </div>

        <div class="contenedor__login-register">

              <form action="tipos-contenido.html" method="get" class="formulario__login">
              <h2>Iniciar Sesión</h2>
             <input type="text" placeholder="Correo estudiantil o numero de DNI">
              <input type="password" placeholder="Contraseña">
             <button type="submit">Entrar</button>
             


               </form>

              <form action="registrar.php" method="post" class="formulario__register">
             <h2>Registrarse</h2>
              <input type="text" name="nombre" placeholder="Nombre completo" required>
                <input type="text" name="email" placeholder="Correo estudiantil o numero de DNI" required>
                <input type="password" name="password" placeholder="Contraseña" required>
              <input type="password" name="confirm_password" placeholder="Confirmar contraseña" required>
              <button type="submit">Registrarse</button>
              <p style="margin-top: 10px;"><a href="admin_login.php">Acceso administrador</a></p>

             </form>
 </div>

   </div>
    </main>
    <script src="script.js?v=2"></script>
   </body> 
</html>
