<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>BIBLIOTECA UNFV</title>
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                font-family: Arial, sans-serif;
                color: white;
                 text-align: center;
                position: relative;
                background-image: url("biblioteca.png");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }
            body::before {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
            }
            .container {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 50px;
            }
            .intro-box {
                max-width: 540px;
                width: 100%;
                background: transparent;
                border: none;
                padding: 30px;
            }
            .icon-link {
                position: absolute;
                top: 20px;
                right: 20px;
                display: inline-block;
                z-index: 2;
            }
            .icon-link img {
                width: 120px;
                max-width: 100%;
                height: auto;
                transition: transform 0.2s ease;
            }
            .icon-link img:hover {
                transform: scale(1.05);
            }
          
            p {
                font-size: 1.2rem;
                line-height: 1.6;
                text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            }
            @media (max-width: 800px) {
                .container {
                   
                    padding: 20px;
                }
                .intro-box {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <a class="icon-link" href="primeracapa.html">
            <img src="icono.png" alt="Iniciar sesión e ir a primera capa">
        </a>
        <div class="container">
            <div class="intro-box">
                <h1>BIBLIOTECA UNFV</h1>
            </div>
        </div>
    </body>
</html>
